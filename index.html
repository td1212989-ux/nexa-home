<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa New Tab</title>
    <style>
        /* Modern Premium Dark Theme styling matching nexa://newtab */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0c0e; /* Deep Premium Black */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* Nexa Brand Logo with Teal Dot */
        .brand-logo {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: #ffffff;
            display: flex;
            align-items: baseline;
            user-select: none;
            margin-bottom: 8px;
        }
        .brand-logo span {
            color: #00dfa2; /* Exact premium green/teal dot color */
            font-size: 62px;
            line-height: 0;
            margin-left: 1px;
        }

        /* Search Form & Box Style */
        .search-form {
            width: 100%;
        }
        .search-container {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box {
            width: 100%;
            height: 52px;
            background-color: #212327; /* Dark Grey Input Fill */
            border: none;
            border-radius: 28px;
            padding: 0 50px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: background-color 0.2s;
        }
        .search-box::placeholder {
            color: #8e9094; /* Grey placeholder matching the screenshot */
        }

        /* Icons Positioning inside Search Box */
        .search-icon {
            position: absolute;
            left: 18px;
            fill: #8e9094;
            width: 20px;
            height: 20px;
        }
        .mic-icon {
            position: absolute;
            right: 18px;
            fill: #8e9094;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Teal AI Mode Button */
        .ai-mode-btn {
            width: 100%;
            height: 48px;
            background-color: rgba(0, 223, 162, 0.05); /* Soft teal glow */
            border: 1px solid #00dfa2; /* Solid teal border */
            border-radius: 24px;
            color: #00dfa2;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .ai-mode-btn:active {
            background-color: rgba(0, 223, 162, 0.15);
            transform: scale(0.98);
        }

        /* Shortcut Grid */
        .shortcuts-grid {
            display: flex;
            justify-content: flex-start;
            gap: 24px;
            width: 100%;
            margin-top: 16px;
            padding-left: 10px;
        }
        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            width: 70px;
            gap: 8px;
        }
        .shortcut-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .shortcut-icon:active {
            transform: scale(0.92);
        }
        /* Nexa Home Shortcut (Greyish) */
        .icon-nexa {
            background-color: #2b2c31;
            fill: #a0a2a6;
        }
        /* YouTube Shortcut (Red) */
        .icon-youtube {
            background-color: #ff0000;
            fill: #ffffff;
        }
        .shortcut-title {
            color: #8e9094;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Logo: nexa. -->
        <div class="brand-logo">nexa<span>.</span></div>

        <!-- Search Bar -->
        <form class="search-form" action="https://www.google.com/search" method="GET">
            <div class="search-container">
                <!-- Search Icon -->
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                
                <input type="text" name="q" class="search-box" placeholder="Search Nexa or type a URL" autocomplete="off" autofocus>
                
                <!-- Mic Icon -->
                <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/></svg>
            </div>
        </form>

        <!-- AI Mode Pill Button -->
        <button class="ai-mode-btn" onclick="alert('AI Mode Activated! (Trigger your custom AI Assistant here)')">
            <!-- Sparkle/Stars SVG Icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #00dfa2;">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5z"/>
                <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>
            </svg>
            AI Mode
        </button>

        <!-- Quick Access Grid (matching screenshot) -->
        <div class="shortcuts-grid">
            <!-- Shortcut 1: Nexa Home -->
            <a href="https://nexa-home-orpin.vercel.app/" class="shortcut-item">
                <div class="shortcut-icon icon-nexa">
                    <!-- Globe SVG Icon -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </div>
                <div class="shortcut-title">nexa-hom...</div>
            </a>

            <!-- Shortcut 2: YouTube -->
            <a href="https://m.youtube.com" class="shortcut-item">
                <div class="shortcut-icon icon-youtube">
                    <!-- Play/Youtube SVG Icon -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.108C19.522 3.535 12 3.535 12 3.535s-7.522 0-9.388.52a3.003 3.003 0 0 0-2.11 2.108C0 8.03 0 12 0 12s0 3.97.502 5.837a3.003 3.003 0 0 0 2.11 2.108c1.866.52 9.388.52 9.388.52s7.522 0 9.388-.52a3.002 3.002 0 0 0 2.11-2.108C24 15.97 24 12 24 12s0-3.97-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </div>
                <div class="shortcut-title">m.youtub...</div>
            </a>
        </div>
    </div>

</body>
</html>
