<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa</title>
    <style>
        /* Exact Google Dark Mode Style */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #202124;
            color: #e8eaed;
            font-family: Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
            align-items: center;
        }
        /* Top Navigation Bar Bar */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
        }
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        header a {
            color: #e8eaed;
            text-decoration: none;
            font-size: 14px;
        }
        .sign-in-btn {
            background-color: #8ab4f8;
            color: #202124;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 500;
        }
        /* Main Container */
        main {
            width: 100%;
            max-width: 584px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 12%; /* Perfect Mobile/Desktop Center View */
        }
        /* Nexa Brand Text */
        .brand-logo {
            font-size: 80px; /* Big Brand Styling */
            font-weight: 500;
            letter-spacing: -2px;
            color: #ffffff;
            margin-bottom: 24px;
            user-select: none;
        }
        /* Search Box System */
        .search-container {
            width: 100%;
            position: relative;
        }
        .search-box {
            width: 100%;
            height: 46px;
            background-color: #303134;
            border: 1px solid #5f6368;
            border-radius: 24px;
            padding: 0 45px;
            color: #e8eaed;
            font-size: 16px;
            outline: none;
            transition: background-color 0.2s;
        }
        .search-box:focus {
            background-color: #303134;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        /* Lens and Search Icons Positioning */
        .search-icon {
            position: absolute;
            left: 14px;
            top: 13px;
            fill: #9aa0a6;
            width: 20px;
            height: 20px;
        }
        .mic-icon {
            position: absolute;
            right: 16px;
            top: 11px;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        /* Offered In / Subtext Languages */
        .languages {
            margin-top: 28px;
            font-size: 13px;
            color: #bdc1c6;
            text-align: center;
            line-height: 1.8;
        }
        .languages a {
            color: #8ab4f8;
            text-decoration: none;
            margin-left: 8px;
        }
        /* Footer Area */
        footer {
            width: 100%;
            background-color: #171717;
            font-size: 14px;
            color: #9aa0a6;
        }
        .footer-top {
            padding: 15px 20px;
            border-bottom: 1px solid #212327;
        }
        .footer-bottom {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 15px 20px;
            gap: 15px;
        }
        .footer-links {
            display: flex;
            gap: 20px;
        }
        .footer-links a {
            color: #9aa0a6;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Top Menu Header -->
    <header>
        <div class="header-left">
            <svg focusable="false" viewBox="0 0 24 24" style="fill:#e8eaed; width:24px; height:24px;"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
            <a href="#" style="font-weight: bold; border-bottom: 2px solid #8ab4f8; padding-bottom: 5px;">ALL</a>
            <a href="#" style="color: #9aa0a6;">IMAGES</a>
        </div>
        <div class="header-right">
            <!-- Apps Grid Icon -->
            <svg class="gb_i" focusable="false" viewBox="0 0 24 24" style="fill:#e8eaed; width:24px; height:24px;"><path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm-12,6c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm-12,6c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0zm6,0c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,0 2,0z"></path></svg>
            <a href="#" class="sign-in-btn">Sign in</a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Google replaced with Nexa -->
        <div class="brand-logo">Nexa</div>

        <!-- Real Working Google Search Action Form -->
        <div class="search-container">
            <form action="https://www.google.com/search" method="GET">
                <!-- Search Icon -->
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                
                <input type="text" name="q" class="search-box" autocomplete="off" autofocus>
                
                <!-- Google Camera Lens Mock Icon -->
                <svg class="mic-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="#34A853" d="M12 17c-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V22h2v-3.08c3.39-.49 6-3.39 6-6.92h-2c0 2.76-2.24 5-5 5z"/></svg>
            </form>
        </div>

        <!-- Languages Section mimicking the original screenshot -->
        <div class="languages">
            Nexa offered in: 
            <a href="#">हिन्दी</a> <a href="#">বাংলা</a> <a href="#">తెలుగు</a> <a href="#">मराठी</a> <a href="#">தமிழ்</a> <a href="#">ગુજરાતી</a> <a href="#">ಕನ್ನಡ</a> <a href="#">മലയാളം</a> <a href="#">ਪੰਜਾਬੀ</a>
        </div>
    </main>

    <!-- Bottom Ecosystem Footer -->
    <footer>
        <div class="footer-top">India</div>
        <div class="footer-bottom">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

</body>
</html>
